version: '3.8'

services:
  sync-api:
    build:
      context: .
      dockerfile: sync-api/Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
    image: waxflow-api:${VERSION:-latest}
    container_name: waxflow-api
    ports:
      - "8402:8402"
    volumes:
      - sync-data:/app/data
      # Mount your music library directory (e.g., /path/to/music/library)
      - ${MUSIC_HOST_PATH:-./music}:/music
      # - ./.git:/app/.git:ro  # Optional: mount for version info
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8400}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://localhost:8402/api/spotify/callback}
      - TIDARR_URL=${TIDARR_URL:-http://localhost:8484}  # optional: only for legacy Tidarr fallback
      - LEXICON_API_URL=${LEXICON_API_URL:-http://localhost:48624}
      - MUSIC_LIBRARY_PATH=/music
      - SLS_DB_PATH=/app/data/sync.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8402/api/admin/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sync-worker:
    build:
      context: ./sync-worker
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
    image: waxflow-worker:${VERSION:-latest}
    container_name: waxflow-worker
    ports:
      - "8403:8403"
    volumes:
      - sync-data:/app/data
      # Mount your music library directory (same as sync-api)
      - ${MUSIC_HOST_PATH:-./music}:/music
      # Mount your downloads/input directory
      - ${DOWNLOADS_HOST_PATH:-./downloads}:/downloads
      # Tidal auth file (optional -- only if using legacy Tidarr config)
      # - /path/to/tiddl/auth.json:/tiddl-auth/auth.json:ro
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://localhost:8402/api/spotify/callback}
      - TIDARR_URL=${TIDARR_URL:-http://localhost:8484}  # optional: only for legacy Tidarr fallback
      - LEXICON_API_URL=${LEXICON_API_URL:-http://localhost:48624}
      - MUSIC_LIBRARY_PATH=/music
      - SLS_DB_PATH=/app/data/sync.db
      - TIDDL_PATH=/tiddl-config
    depends_on:
      sync-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8403/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  sync-web:
    build:
      context: ./sync-web
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8402}
        - INTERNAL_API_URL=http://sync-api:8402
    image: waxflow-web:${VERSION:-latest}
    container_name: waxflow-web
    ports:
      - "8400:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8402}
      - INTERNAL_API_URL=http://sync-api:8402
    depends_on:
      - sync-api
    restart: unless-stopped

volumes:
  sync-data:
